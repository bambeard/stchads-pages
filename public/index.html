<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St. Chads</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Times, "Times New Roman", Georgia, serif;
      font-size: 12px;
      line-height: 14px;
      color: #000;
      background: #fff;
    }

    a { color: #000; text-decoration: none; }
    a:hover { text-decoration: underline; }

    #page {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    /* ---- Header ---- */
    #header {
      display: flex;
      align-items: flex-start;
      margin-bottom: 0;
    }

    #header-text {
      flex: 0 0 65%;
      text-align: center;
      padding-top: 71px;
    }

    #site-title {
      font-size: 24px;
      line-height: 29px;
      font-weight: normal;
    }

    #address {
      margin-top: 15px;
      font-size: 12px;
      line-height: 14px;
    }

    #address a, #contact a { color: #000; text-decoration: none; }

    #contact {
      font-size: 12px;
      line-height: 14px;
    }

    #contact-email { margin-top: 12px; }
    #contact-ig    { margin-top: 4px; }

    #header-logo {
      flex: 0 0 35%;
      text-align: right;
    }

    #header-logo img {
      width: 214px;
      height: 214px;
      display: block;
      margin-left: auto;
    }

    /* ---- Exhibitions ---- */
    #exhibitions {
      margin-top: 158px;
    }

    .exhibition {
      margin-bottom: 100px;
    }

    /* Invite/flyer — centred, natural size */
    .invite-wrap {
      text-align: center;
      margin-bottom: 4px;
    }

    .invite-wrap img {
      display: inline-block;
      max-width: 100%;
      height: auto;
    }

    /* Exhibition text block — centred, 12/14 */
    .exhibition-text {
      text-align: center;
      font-size: 12px;
      line-height: 14px;
      margin-top: 35px;
      margin-bottom: 17px;
      width: 86.96%;
      margin-left: auto;
      margin-right: auto;
    }

    .exhibition-text p { margin: 0; }
    .exhibition-text p + p { margin-top: 0.5em; }

    /* Remaining photos — full column width */
    .exhibition-photos img {
      display: block;
      width: 100%;
      height: auto;
      margin-bottom: 4px;
    }

    .video-embed {
      position: relative;
      width: 86.96%;
      margin: 0 auto 4px;
      padding-bottom: calc(86.96% * 0.5625);
    }

    .video-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }

    .loading { padding: 40px 0; color: #666; }

    /* Mobile */
    @media (max-width: 640px) {
      #header { flex-direction: column-reverse; gap: 16px; }
      #header-text { padding-top: 0; flex: 1; width: 100%; }
      #header-logo { flex: none; width: 100%; text-align: center; }
      #header-logo img { margin: 0 auto; width: 120px; height: 120px; }
      #exhibitions { margin-top: 60px; }
    }
  </style>
</head>
<body>
<div id="page">

  <div id="header">
    <div id="header-text">
      <p id="site-title">St. Chads</p>
      <div id="address">
        <a href="https://goo.gl/maps/W4tXKJJZRyR8Xgb18" target="_blank" rel="noopener">
          <p>42 Wicklow St</p>
          <p>Kings Cross</p>
          <p>London WC1X 9JS</p>
          <p>&nbsp;</p>
          <p>51°31'45.9&quot;N 0°07'05.3&quot;W</p>
        </a>
      </div>
      <div id="contact">
        <p id="contact-email"><a href="mailto:stchadsprojects@gmail.com">stchadsprojects@gmail.com</a></p>
        <p id="contact-ig"><a href="https://www.instagram.com/stchadsprojects/" target="_blank" rel="noopener">@stchadsprojects</a></p>
      </div>
    </div>
    <div id="header-logo">
      <a href="https://www.instagram.com/stchadsprojects/" target="_blank" rel="noopener">
        <img src="https://www.stchadsprojects.com/images/bumprint2.jpg" alt="St. Chads" />
      </a>
    </div>
  </div>

  <div id="exhibitions">
    <p class="loading">Loading…</p>
  </div>

</div>
<script>
(async function () {
  const container = document.getElementById("exhibitions");
  let data;
  try {
    const res = await fetch("/api/exhibitions");
    data = await res.json();
  } catch (e) {
    container.innerHTML = "<p>Failed to load exhibitions.</p>";
    return;
  }
  if (!data.exhibitions || data.exhibitions.length === 0) {
    container.innerHTML = "";
    return;
  }
  container.innerHTML = data.exhibitions.map(renderExhibition).join("");
})();

function renderExhibition(ex) {
  const media = ex.media || [];
  const invite = media.find(m => m.type === "image" && m.role === "invite");
  const rest   = media.filter(m => !(m.type === "image" && m.role === "invite"));

  const inviteHtml = invite
    ? `<div class="invite-wrap"><img src="${esc(invite.src)}" alt="" loading="lazy" /></div>`
    : "";

  const descHtml = renderDescription(ex.description);

  const restHtml = rest.length
    ? `<div class="exhibition-photos">${rest.map(renderMedia).join("")}</div>`
    : "";

  return `<div class="exhibition" id="ex-${esc(ex.id)}">
    ${inviteHtml}
    ${descHtml ? `<div class="exhibition-text">${descHtml}</div>` : ""}
    ${restHtml}
  </div>`;
}

function renderDescription(text) {
  if (!text) return "";
  return text
    .split("\n\n")
    .map(p => p.trim())
    .filter(Boolean)
    .map(p => `<p>${esc(p).replace(/\n/g, "<br>")}</p>`)
    .join("");
}

function renderMedia(m) {
  if (m.type === "image") {
    return `<img src="${esc(m.src)}" alt="" loading="lazy" />`;
  }
  if (m.type === "video") {
    let src = "";
    if (m.platform === "vimeo")
      src = `https://player.vimeo.com/video/${esc(m.id)}?title=0&byline=0&portrait=0&color=FFFFFF&autoplay=0&loop=1`;
    else if (m.platform === "youtube")
      src = `https://www.youtube.com/embed/${esc(m.id)}?loop=1&playlist=${esc(m.id)}&showinfo=0&modestbranding=1&controls=1`;
    if (!src) return "";
    return `<div class="video-embed"><iframe src="${src}" allowfullscreen></iframe></div>`;
  }
  return "";
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
