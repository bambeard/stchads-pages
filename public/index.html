<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St. Chads</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Times, "Times New Roman", Georgia, serif;
      font-size: 14px;
      line-height: 1.4;
      color: #000;
      background: #fff;
    }

    a { color: #000; text-decoration: none; }
    a:hover { text-decoration: underline; }

    #page {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    /* Header */
    #header {
      position: relative;
      text-align: center;
      margin-bottom: 60px;
      padding-top: 20px;
    }

    #site-title {
      font-size: 24px;
      line-height: 29px;
      font-weight: normal;
      margin-bottom: 15px;
    }

    #address {
      font-size: 12px;
      line-height: 14px;
      margin-bottom: 12px;
    }

    #address p, #contact p { margin: 0; }

    #contact {
      font-size: 12px;
      line-height: 14px;
    }

    #instagram-logo {
      position: absolute;
      top: 20px;
      right: 0;
    }

    #instagram-logo img {
      width: 214px;
      height: 214px;
      display: block;
    }

    /* Exhibitions */
    .exhibition {
      margin-bottom: 100px;
    }

    .exhibition-media {
      width: 100%;
    }

    .exhibition-media img {
      display: block;
      width: 100%;
      height: auto;
      margin-bottom: 4px;
    }

    .exhibition-media img.invite {
      width: auto;
      max-width: 100%;
    }

    .video-embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      margin-bottom: 4px;
    }

    .video-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }

    .exhibition-text {
      margin-top: 16px;
      font-size: 12px;
      line-height: 14px;
      text-align: center;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .exhibition-text p {
      margin: 0;
    }

    .exhibition-text p + p {
      margin-top: 0.5em;
    }

    .loading {
      padding: 40px 0;
      color: #666;
    }

    @media (max-width: 640px) {
      #instagram-logo { position: static; margin-bottom: 16px; }
      #instagram-logo img { width: 100px; height: 100px; margin: 0 auto; }
    }
  </style>
</head>
<body>
<div id="page">
  <div id="header">
    <a id="instagram-logo" href="https://www.instagram.com/stchadsprojects/" target="_blank" rel="noopener">
      <img src="https://www.stchadsprojects.com/images/bumprint2.jpg" alt="St. Chads Instagram" />
    </a>
    <p id="site-title">St. Chads</p>
    <div id="address">
      <a href="https://goo.gl/maps/W4tXKJJZRyR8Xgb18" target="_blank" rel="noopener">
        <p>42 Wicklow St</p>
        <p>Kings Cross</p>
        <p>London WC1X 9JS</p>
        <p>&nbsp;</p>
        <p>51°31'45.9&quot;N 0°07'05.3&quot;W</p>
      </a>
    </div>
    <div id="contact">
      <p><a href="mailto:stchadsprojects@gmail.com">stchadsprojects@gmail.com</a></p>
      <p><a href="https://www.instagram.com/stchadsprojects/" target="_blank" rel="noopener">@stchadsprojects</a></p>
    </div>
  </div>

  <div id="exhibitions">
    <p class="loading">Loading…</p>
  </div>
</div>

<script>
(async function () {
  const container = document.getElementById("exhibitions");

  let data;
  try {
    const res = await fetch("/api/exhibitions");
    data = await res.json();
  } catch (e) {
    container.innerHTML = "<p>Failed to load exhibitions.</p>";
    return;
  }

  if (!data.exhibitions || data.exhibitions.length === 0) {
    container.innerHTML = "";
    return;
  }

  const html = data.exhibitions.map(renderExhibition).join("");
  container.innerHTML = html;
})();

function renderExhibition(ex) {
  const mediaHtml = (ex.media || []).map(renderMedia).join("");
  const descHtml = renderDescription(ex.description);

  return `<div class="exhibition" id="ex-${esc(ex.id)}">
    <div class="exhibition-media">${mediaHtml}</div>
    ${descHtml ? `<div class="exhibition-text">${descHtml}</div>` : ""}
  </div>`;
}

function renderDescription(text) {
  if (!text) return "";
  return text
    .split("\n\n")
    .map((p) => p.trim())
    .filter(Boolean)
    .map((p) => `<p>${esc(p).replace(/\n/g, "<br>")}</p>`)
    .join("");
}

function renderMedia(m) {
  if (m.type === "image") {
    const isInvite = m.role === "invite";
    // Landscape heuristic: filename contains typical photo keywords or is not square
    const src = m.src || "";
    const cls = isInvite ? "invite" : "landscape";
    return `<img class="${cls}" src="${esc(src)}" alt="" loading="lazy" />`;
  }
  if (m.type === "video") {
    let src = "";
    if (m.platform === "vimeo") {
      src = `https://player.vimeo.com/video/${esc(m.id)}?title=0&byline=0&portrait=0&color=FFFFFF&autoplay=0&loop=1`;
    } else if (m.platform === "youtube") {
      src = `https://www.youtube.com/embed/${esc(m.id)}?loop=1&playlist=${esc(m.id)}&showinfo=0&modestbranding=1&controls=1`;
    }
    if (!src) return "";
    return `<div class="video-embed"><iframe src="${src}" allowfullscreen></iframe></div>`;
  }
  return "";
}

function esc(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>
</body>
</html>
